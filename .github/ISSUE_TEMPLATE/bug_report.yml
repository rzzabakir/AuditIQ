name: Bug report
description: Report a reproducible AuditIQ problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps, command, or uploaded file shape.
      placeholder: |
        1. Run `streamlit run app.py`
        2. Upload a CSV with ...
        3. Click Run audit
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.9"
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include logs, screenshots, or a small anonymized sample if helpful.
